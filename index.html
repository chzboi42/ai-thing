<!DOCTYPE html>
<html>
<head>
    <title>FRC AI Mentor</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        #chatbox { width: 100%; max-width: 700px; height: 500px; background: #1e1e1e; border-radius: 10px; padding: 20px; overflow-y: auto; border: 1px solid #333; margin-bottom: 20px; }
        .input-area { display: flex; width: 100%; max-width: 700px; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 5px; border: none; background: #333; color: white; }
        button { padding: 15px 25px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 5px; }
        .user { background: #2c3e50; border-left: 4px solid #3498db; }
        .ai { background: #27ae6033; border-left: 4px solid #2ecc71; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🤖 FRC Programming Assistant</h1>
    <div id="chatbox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask to fix code or generate a new subsystem...">
        <button onclick="askAI()">Send</button>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chatbox');
            const question = input.value;
            if(!question) return;

            chat.innerHTML += `<div class="msg user"><b>Student:</b><br>${question}</div>`;
            input.value = "";

            try {
                const response = await fetch('https://frcai.onrender.com/ask', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                chat.innerHTML += `<div class="msg ai"><b>Mentor:</b><br>${data.answer}</div>`;
            } catch (err) {
                chat.innerHTML += `<div class="msg ai" style="color:red">Server Error. Make sure Render is awake!</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
